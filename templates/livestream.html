{% extends "base.html" %}

{% block content %}

<div class="status-box">

   <div class="stream-header">
    <h2><span class="live-dot"></span> Live Security Feed</h2>
    <p class="system-status">System Status: <span class="text-success">Monitoring</span></p>
</div>

<div class="monitoring-layout">
    <div class="video-frame">
        <img src="http://192.168.8.190:5000" class="main-stream" alt="Live Camera Feed">
        <div class="stream-overlay">
            <div class="timestamp" id="clock"></div>
            <div class="cam-id">CAM-01: Main Hallway</div>
        </div>
    </div>
</div>  

<script>
    // Simple clock for the overlay
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
</script>

</div>

{% endblock %}
